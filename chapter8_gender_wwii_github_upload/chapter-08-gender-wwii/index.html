<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gender and World War II</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back-link" href="../">← Back to main site</a>
      <div class="tools">
        <button id="decreaseFont" type="button" aria-label="Decrease font size">A−</button>
        <button id="increaseFont" type="button" aria-label="Increase font size">A+</button>
        <button id="toggleTheme" type="button" aria-label="Toggle dark mode">Dark</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero card">
      <p class="eyebrow">Chapter 8</p>
      <h1 id="siteTitle">Gender and World War II</h1>
      <p id="siteSubtitle">Chapter 8 reading, split into four study sections</p>
      <p class="small-note">Text-only upload package. Audio/timing files are not included yet.</p>
    </section>

    <section class="layout">
      <aside class="section-list card" aria-label="Section list">
        <h2>Sections</h2>
        <div id="sectionButtons" class="section-buttons"></div>
      </aside>

      <article class="reader card">
        <div class="reader-head">
          <p class="eyebrow">Reading section</p>
          <h2 id="sectionTitle">Loading…</h2>
          <p id="sectionDescription" class="muted"></p>
        </div>
        <div id="readerText" class="reader-text" aria-live="polite"></div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
